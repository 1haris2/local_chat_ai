name: local_chat_ai
description: "Local AI Chat - Run LLMs on your Android device"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  llama_flutter_android: ^0.1.2
  dio: ^5.4.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  flutter_markdown: ^0.7.0
  intl: ^0.19.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 26
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#0D1117"
  image: "assets/images/logo.png"
  android: true
  ios: true
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#0D1117"
